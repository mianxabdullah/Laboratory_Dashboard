<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Workflow & Laboratory Analytics</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a24;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-purple: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem 5%;
            background: linear-gradient(to bottom, #14141a, var(--bg-color));
            border-bottom: 1px solid #27273a;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-area h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(45deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-area p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .badge {
            background-color: var(--accent-glow);
            border: 1px solid var(--accent-purple);
            color: #c084fc;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        main {
            flex: 1;
            padding: 2rem 5%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1300px;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        0 0 50px var(--accent-glow);
            border: 1px solid #2d2d3f;
        }

        /* Responsive Wrapper to maintain aspect ratio */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-top: 47.47%; /* Aspect ratio matching 1140x541.25 */
            height: 0;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            padding: 1.5rem 5%;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid #1f1f2e;
            background-color: #0b0b0d;
        }

        /* Adjustments for smaller screens */
        @media (max-width: 768px) {
            .iframe-wrapper {
                padding-top: 60%; /* Slightly taller on mobile for better visibility */
            }
            header {
                padding: 1.5rem 5%;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="title-area">
                <h1>Clinical Pipeline Command Center</h1>
                <p>End-to-end sample lifecycle monitoring, validation metrics, and operational throughput</p>
            </div>
            <div class="badge">
                ● Live Monitoring
            </div>
        </div>
    </header>

    <main>
        <div class="dashboard-container">
            <div class="iframe-wrapper">
                <iframe title="Laboratory_Dashboard" src="https://app.powerbi.com/reportEmbed?reportId=929e8313-4b35-4ed8-9a02-7421def551ad&autoAuth=true&ctid=b0eeb88f-a842-482d-a9c0-d374ec25ff27" allowFullScreen="true"></iframe>
            </div>
        </div>
    </main>

    <footer>
        <p>Laboratory Operational Intelligence Dashboard &copy; 2026. All rights reserved.</p>
    </footer>

</body>
</html>
